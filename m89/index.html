<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Welcome to M89</title>
<meta name="description" content="Brand New Interactive Experience">

<meta property="og:title" content="Welcome to M89">
<meta property="og:description" content="Brand New Interactive Experience">
<meta property="og:image" content="https://gadspro2000.com/m89/og.jpg">
<meta property="og:url" content="https://gadspro2000.com/m89">
<meta property="og:type" content="website">

<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preload" as="image" href="banner.webp" type="image/webp">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
.container{width:min(100%,1920px);margin:0 auto;padding:24px 12px 40px;text-align:center}

/* ✨ 金色標題 */
h1{
  font-size:clamp(32px,5vw,68px);
  font-weight:900;
  letter-spacing:.03em;
  background:linear-gradient(90deg,#FFD700,#FFC107,#FFB300);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 12px rgba(255,215,0,0.4);
  margin-bottom:10px;
}

/* ✨ 金色副標 */
p{
  font-size:clamp(18px,2vw,28px);
  background:linear-gradient(90deg,#FFE082,#FFD54F);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:22px;
}

.banner-wrap{
  width:100%;
  max-width:750px;
  margin:0 auto 28px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(255,255,255,.06);
}

.banner{
  display:block;
  width:100%;
  height:auto;
  aspect-ratio:750/600;
  object-fit:contain;
  background:#000;
}

/* 🔥 彩虹流光按鈕升級 */
.cta{
  position:relative;
  display:inline-block;
  padding:3px;
  border-radius:999px;
  text-decoration:none;
  background:linear-gradient(90deg,#ff0000,#ff7a00,#ffee00,#00ff85,#00c3ff,#7a00ff,#ff00c8,#ff0000);
  background-size:300% 100%;
  animation:flow 2.5s linear infinite;
}

.cta span{
  display:inline-block;
  background:#000;
  color:#FFD700;
  padding:16px 36px;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  letter-spacing:.08em;
}

.cta:hover span{
  background:#050505;
  color:#fff;
}

@keyframes flow{
  0%{background-position:0% 50%}
  100%{background-position:300% 50%}
}

</style>
</head>

<body>
<main class="container">

<h1>Welcome to M89</h1>
<p>Brand New Interactive Experience</p>

<div class="banner-wrap">
  <picture>
    <source srcset="banner.webp" type="image/webp">
    <img class="banner" src="banner-optimized.jpg" alt="M89 banner">
  </picture>
</div>

<a class="cta" href="https://fbads.m8989.net/login?id=register" target="_blank">
  <span>JOIN&GET20</span>
</a>

</main>
</body>
</html>
