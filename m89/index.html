<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
body{min-height:100vh}
.container{width:min(100%,1920px);margin:0 auto;padding:24px 12px 40px;text-align:center}
h1{font-size:clamp(32px,5vw,68px);font-weight:800;letter-spacing:.02em;line-height:1.05;margin:0 0 10px}
p{font-size:clamp(18px,2vw,28px);color:#d7d7d7;margin:0 0 22px}
.banner-wrap{width:100%;max-width:750px;margin:0 auto 28px;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(255,255,255,.06)}
.banner{display:block;width:100%;height:auto;aspect-ratio:750/600;object-fit:contain;background:#000}
.cta{position:relative;display:inline-block;padding:3px;border-radius:999px;text-decoration:none;background:linear-gradient(90deg,#ff0000,#ff7a00,#ffee00,#00ff85,#00c3ff,#7a00ff,#ff00c8,#ff0000);background-size:300% 100%;animation:flow 2.8s linear infinite}
.cta span{display:inline-block;background:#000;color:#fff;padding:15px 34px;border-radius:999px;font-size:18px;font-weight:800;letter-spacing:.04em;line-height:1;min-width:190px}
@keyframes flow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@media (max-width:768px){
.container{padding:18px 10px 32px}
h1{margin-bottom:8px}
p{margin-bottom:16px}
.banner-wrap{margin-bottom:22px;border-radius:14px}
.cta span{padding:14px 24px;font-size:16px;min-width:170px}
}
</style>

<main class="container">
<h1>Welcome to M89</h1>
<p>Brand New Interactive Experience</p>

<div class="banner-wrap">
  <picture>

    <img class="banner" src="banner-optimized.jpg" alt="M89 banner" width="750" height="600" fetchpriority="high" decoding="async">
  </picture>
</div>

<a class="cta" href="https://fbads.m8989.net/login?id=register" target="_blank" rel="noopener noreferrer">
